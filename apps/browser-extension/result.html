<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Translator Result</title>
    <link rel="stylesheet" href="result.css" />
  </head>
  <body>
    <main class="result">
      <header class="result-header">
        <h1>Read-only Translation</h1>
        <span id="modeTag" class="result-tag" hidden></span>
      </header>
      <section class="result-block result-source">
        <h2>Source</h2>
        <pre id="sourceText" class="result-text"></pre>
      </section>
      <section class="result-block result-translated">
        <h2>Translated</h2>
        <pre id="translatedText" class="result-text result-text-emphasis"></pre>
      </section>
    </main>
    <script src="dist/result.js"></script>
  </body>
</html>
